name: Java CI with Maven and SonarCloud

on:
  push:
    branches:
      - main  # Запускать только при push в ветку main
  pull_request:
    branches:
      - main  # Запускать при PR в ветку main

jobs:
  build:
    runs-on: ubuntu-latest  # Запуск на последней версии Ubuntu

    steps:
    - name: Checkout code
      uses: actions/checkout@v2  # Клонирование кода из репозитория

    - name: Set up JDK 17
      uses: actions/setup-java@v2
      with:
        java-version: '17'  # Устанавливаем JDK 17
        distribution: 'temurin'  # Используем дистрибутив Temurin (Adoptium)

    - name: Clean Maven cache
      run: mvn clean  # Очистка кэша Maven

    - name: Cache Maven dependencies
      uses: actions/cache@v3  # Используем последнюю версию кэширования
      with:
        path: ~/.m2/repository  # Кэширование зависимостей Maven
        key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}  # Ключ для кэширования
        restore-keys: |
          ${{ runner.os }}-maven-

    - name: Build with Maven
      run: mvn clean verify  # Сборка и тестирование проекта

    - name: Run SonarCloud Analysis
      run: mvn sonar:sonar -Dsonar.login=${{ secrets.SONAR_TOKEN }}  # Анализ с помощью SonarCloud
